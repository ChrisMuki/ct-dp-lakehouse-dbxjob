# SLF4J SimpleLogger configuration
# Suppress all logs by default
org.slf4j.simpleLogger.defaultLogLevel=error

# Disable logging for specific packages
org.slf4j.simpleLogger.log.org.apache.spark=off
org.slf4j.simpleLogger.log.org.apache.hadoop=off
org.slf4j.simpleLogger.log.org.spark_project=off

# Only show time, no other decorations
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=false
org.slf4j.simpleLogger.showShortLogName=false