---
resources:
  jobs:
    lakeflow_job:
      name: "lakeflow_job"
      tasks:
      - task_key: "dim_customer"
        spark_jar_task:
          main_class_name: "ct.dna.lakehouse.core.jobs.TableUpdaterEntryPoint"
          run_as_repl: false
          parameters:
          - "${var.config_file}"
          - "${var.package_name}"
          - "dim_customer"
        existing_cluster_id: "${var.cluster_id}"
        libraries:
        - jar: "${var.jar_path}"
      - task_key: "dwh_orders"
        spark_jar_task:
          main_class_name: "ct.dna.lakehouse.core.jobs.TableUpdaterEntryPoint"
          run_as_repl: false
          parameters:
          - "${var.config_file}"
          - "${var.package_name}"
          - "dwh_orders"
        existing_cluster_id: "${var.cluster_id}"
        libraries:
        - jar: "${var.jar_path}"
        depends_on:
        - task_key: "dim_customer"
      - task_key: "dm_country"
        spark_jar_task:
          main_class_name: "ct.dna.lakehouse.core.jobs.TableUpdaterEntryPoint"
          run_as_repl: false
          parameters:
          - "${var.config_file}"
          - "${var.package_name}"
          - "dm_country"
        existing_cluster_id: "${var.cluster_id}"
        libraries:
        - jar: "${var.jar_path}"
        depends_on:
        - task_key: "dwh_orders"
      - task_key: "dm_customer"
        spark_jar_task:
          main_class_name: "ct.dna.lakehouse.core.jobs.TableUpdaterEntryPoint"
          run_as_repl: false
          parameters:
          - "${var.config_file}"
          - "${var.package_name}"
          - "dm_customer"
        existing_cluster_id: "${var.cluster_id}"
        libraries:
        - jar: "${var.jar_path}"
        depends_on:
        - task_key: "dwh_orders"
      - task_key: "dm_daily"
        spark_jar_task:
          main_class_name: "ct.dna.lakehouse.core.jobs.TableUpdaterEntryPoint"
          run_as_repl: false
          parameters:
          - "${var.config_file}"
          - "${var.package_name}"
          - "dm_daily"
        existing_cluster_id: "${var.cluster_id}"
        libraries:
        - jar: "${var.jar_path}"
        depends_on:
        - task_key: "dwh_orders"
      max_concurrent_runs: 1
      timeout_seconds: 0
      queue:
        enabled: true
