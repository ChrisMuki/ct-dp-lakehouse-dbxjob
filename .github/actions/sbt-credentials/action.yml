name: Sbt credentials
description: Create sbt credential file for Artifactory
inputs:
  host:
    description: Artifactory Host
    required: true
  username:
    description: Artifactory Username
    required: true
  token:
    description: Artifactory Token
    required: true
runs:
  using: composite
  steps:
    - name: SBT credentials setup
      shell: bash
      run: |
        mkdir -p "${HOME}/.sbt"

        echo 'realm=Artifactory Realm' > "${HOME}/.sbt/.credentials
        echo "host=${{ inputs.host }}" >> "${HOME}/.sbt/.credentials
        echo "user=${{ inputs.username }}" >> "${HOME}/.sbt/.credentials
        echo "password=${{ inputs.token }}" >> "${HOME}/.sbt/.credentials
        # Also write to /root/.sbt in case HOME differs inside the container.
        if [ "${HOME}" != "/root" ]; then
          mkdir -p /root/.sbt
          cp "${HOME}/.sbt/.credentials" /root/.sbt/.credentials
        fi

