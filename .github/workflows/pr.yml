name: PR Checks

on:
  pull_request:
    branches:
      - main
      - qual
      - dev

# Cancel an in-flight PR build when a new commit lands on the same PR ref.
concurrency:
  group: lakehouse-pr-${{ github.ref }}
  cancel-in-progress: true

run-name: ${{ github.actor }} run PR checks

permissions:
  # PR runs are validation-only: read source, no tags, no commits.
  contents: read
  # Required for the self-refreshing GitHub-OIDC credential below; the staged
  # Scala launcher uses it to mint a Databricks bearer token for
  # `databricks bundle validate`.
  id-token: write

env:
  azAuth: ${{ vars.AZAUTH }}

jobs:
  pr:
    name: PR checks for ${{ github.actor }}
    runs-on: dna17-2
    # Use the `dev` GitHub Environment so we inherit its scoped vars/secrets
    # (AZAUTH, ARTIFACTORY_*). These are not defined at the repo level.
    environment: dev
    permissions:
      # PR runs are validation-only: read source, no tags, no commits.
      contents: read
      # Required for the GitHub OIDC credential used by the launcher.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare runner environment
        uses: CT-DnA/devops-library/.github/actions/runner-config@v1
        with:
          debugProxy: true

      # Mirror the push workflow's build line so PRs catch the same set
      # of compile/test/assembly failures the deploy job would hit.
      - name: Build (test + assembly + stage)
        env:
          sparkConfig: ${{ vars.SCALATEST_LOCAL_SPARKCONFIG }}
        run: sbt "Test/compile" "scalafixAll --check" "test" "lakehouse/assembly" "devops/stage"

      # Run the deploy orchestrator end-to-end EXCEPT the side-effecting steps
      # (volume upload, bundle deploy, bundle run, git tag, cleanup). That
      # gives us a real `databricks bundle validate` against the dev workspace
      # using the exact assets the push workflow would deploy.
      - name: Validate deploy bundle (validateOnly)
        run: |
          BUILD_ID="pr-$(git rev-parse --short HEAD)"

          ./devops/target/universal/stage/bin/deploy \
            "stage=dev" \
            "buildId=${BUILD_ID}" \
            "rootPath=${GITHUB_WORKSPACE}" \
            "assetPath=/tmp/devops" \
            "jarPath=${GITHUB_WORKSPACE}/lakehouse/target/scala-2.13/lakehouse.jar" \
            "validateOnly=true"
 