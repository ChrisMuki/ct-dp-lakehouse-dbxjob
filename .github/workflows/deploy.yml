name: Deploy Lakehouse to Databricks

on:
  pull_request:
    branches:
      - main
      - qual
      - dev
  push:
    branches:
      - main
      - qual
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qual
          - prod

# Cancel in-progress runs for the same ref on PRs; serialise deploys per branch.
concurrency:
  group: lakehouse-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

run-name: ${{ github.actor }} ${{ github.event_name == 'pull_request' && 'validate' || 'deploy' }} databricks lakehouse job

jobs:
  # ── Step 1: compile, test, assemble ─────────────────────────────────────────
  # Runs on every trigger (PR, push, manual). Produces lakehouse.jar artifact.
  build:
    name: Compile, test and assemble
    runs-on: dna-db
    container:
      image: ctdsfacr.azurecr.io/runner/sbt_java17:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare runner environment
        uses: ./.github/actions/runner-config

      - name: Prepare sbt credentials
        uses: ./.github/actions/sbt-credentials
        with:
          host: ${{ vars.ARTIFACTORY_HOST }}
          username: ${{ vars.ARTIFACTORY_USER }}
          token: ${{ secrets.ARTIFACTORY_TOKEN }}

      - name: Compile, test and assemble
        run: sbt "clean;test;lakehouse/assembly"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: lakehouse-jar-${{ github.sha }}
          path: lakehouse/target/scala-2.13/lakehouse.jar
          retention-days: 7

  # ── Step 2: deploy ───────────────────────────────────────────────────────────
  # Skipped on pull_request events — PRs only validate via the build job above.
  deploy:
    name: Deploy lakehouse by ${{ github.actor }}
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: dna-db
    environment: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'prod' && 'DB-DNA-PROD' || github.event.inputs.environment == 'qual' && 'DB-DNA-QUAL' || 'DB-DNA-DEV') || github.ref == 'refs/heads/main' && 'DB-DNA-PROD' || github.ref == 'refs/heads/qual' && 'DB-DNA-QUAL' || 'DB-DNA-DEV' }}
    container:
      image: ctdsfacr.azurecr.io/runner/sbt_java17:latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare runner environment
        uses: ./.github/actions/runner-config

      - name: Prepare sbt credentials
        uses: ./.github/actions/sbt-credentials
        with:
          host: ${{ vars.ARTIFACTORY_HOST }}
          username: ${{ vars.ARTIFACTORY_USER }}
          token: ${{ secrets.ARTIFACTORY_TOKEN }}

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: lakehouse-jar-${{ github.sha }}
          path: lakehouse/target/scala-2.13

      - name: Stage cicd subproject
        run: sbt "cicd/stage"

      - name: Determine stage and target mode
        id: stage
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            STAGE="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            STAGE="prod"
          elif [ "${{ github.ref }}" = "refs/heads/qual" ]; then
            STAGE="qual"
          else
            STAGE="dev"
          fi
          echo "STAGE=${STAGE}" >> $GITHUB_OUTPUT

          # development mode for the dev stage; production for qual and prod
          if [ "${STAGE}" = "dev" ]; then
            echo "TARGET_MODE=development" >> $GITHUB_OUTPUT
          else
            echo "TARGET_MODE=production" >> $GITHUB_OUTPUT
          fi

          # BUILD_ID: date + short commit SHA for volume path & traceability
          echo "BUILD_ID=$(date +'%Y%m%d-%H%M')-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy to ${{ steps.stage.outputs.STAGE }}
        env:
          # ── Required secrets ─────────────────────────────────────────────────
          DB_HOST:                  ${{ secrets.DB_HOST }}
          ARM_TENANT_ID:            ${{ secrets.ARM_TENANT_ID }}
          DB_DEPLOY_CLIENT_ID:      ${{ secrets.DB_CLIENT_ID }}
          DB_DEPLOY_CLIENT_SECRET:  ${{ secrets.DB_CLIENT_SECRET }}
          # ── Optional secrets / vars (omit to use Scala/AssetDirectory defaults)
          # DB_JOB_RUN_CLIENT_ID → default: volume schema="default", no run_as
          DB_JOB_RUN_CLIENT_ID:     ${{ secrets.DB_CLIENT_ID }}
          # VOLUME_CATALOG → default: ctdp<stage>dbxlakehouse
          VOLUME_CATALOG:           ${{ vars.VOLUME_CATALOG }}
          # CLUSTER_POLICY_ID → default: no policy
          CLUSTER_POLICY_ID:        ${{ vars.CLUSTER_POLICY_ID }}
          # INSTANCE_POOL_ID → default: no pool (uses node types)
          INSTANCE_POOL_ID:         ${{ vars.INSTANCE_POOL_ID }}
        run: |
          STAGE="${{ steps.stage.outputs.STAGE }}"
          TARGET_MODE="${{ steps.stage.outputs.TARGET_MODE }}"
          BUILD_ID="${{ steps.stage.outputs.BUILD_ID }}"

          # ── Required fields ──────────────────────────────────────────────────
          CONFIG_JSON="{\"host\":\"${DB_HOST}\",\"targetMode\":\"${TARGET_MODE}\","
          CONFIG_JSON="${CONFIG_JSON}\"deploymentIdentity\":{\"authType\":\"azure-client-secret\","
          CONFIG_JSON="${CONFIG_JSON}\"tenantId\":\"${ARM_TENANT_ID}\","
          CONFIG_JSON="${CONFIG_JSON}\"clientId\":\"${DB_DEPLOY_CLIENT_ID}\","
          CONFIG_JSON="${CONFIG_JSON}\"clientSecret\":\"${DB_DEPLOY_CLIENT_SECRET}\"}"

          # ── Optional fields — omitted when var/secret is not set ─────────────
          [ -n "${DB_JOB_RUN_CLIENT_ID}" ] \
            && CONFIG_JSON="${CONFIG_JSON},\"jobRunIdentity\":{\"clientId\":\"${DB_JOB_RUN_CLIENT_ID}\"}"
          [ -n "${VOLUME_CATALOG}" ] \
            && CONFIG_JSON="${CONFIG_JSON},\"volumeCatalog\":\"${VOLUME_CATALOG}\""

          # clusterConfiguration: only include the block if any org-specific
          # field is set; cluster fields with Scala defaults are not repeated here
          CLUSTER=""
          [ -n "${CLUSTER_POLICY_ID}" ] && CLUSTER="${CLUSTER},\"clusterPolicyId\":\"${CLUSTER_POLICY_ID}\""
          [ -n "${INSTANCE_POOL_ID}" ]  && CLUSTER="${CLUSTER},\"instancePoolId\":\"${INSTANCE_POOL_ID}\""
          [ -n "${CLUSTER}" ] \
            && CONFIG_JSON="${CONFIG_JSON},\"clusterConfiguration\":{${CLUSTER#,}}"

          # resourceFilesPath is fixed for this project
          CONFIG_JSON="${CONFIG_JSON},\"resourceFilesPath\":\"resources\"}"

          ./cicd/target/universal/stage/bin/deploy \
            "stage=${STAGE}" \
            "buildId=${BUILD_ID}" \
            "rootPath=${GITHUB_WORKSPACE}" \
            "assetPath=/tmp/cicd" \
            "jarPath=${GITHUB_WORKSPACE}/lakehouse/target/scala-2.13/lakehouse.jar" \
            "deploymentConfig=${CONFIG_JSON}"
