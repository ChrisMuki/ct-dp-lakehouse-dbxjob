name: Deploy Lakehouse to Databricks

on:
  push:
    branches:
      - main
      - qual
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qual
          - prod

concurrency:
  group: lakehouse-deploy
  cancel-in-progress: false

run-name: ${{ github.actor }} deploy databricks lakehouse job

jobs:
  deploy:
    name: Deploy lakehouse by ${{ github.actor }}
    runs-on: dna-db
    environment: ${{ github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment || github.ref == 'refs/heads/main' &&
      'prod' || github.ref == 'refs/heads/qual' && 'qual' || 'dev' }}
    container:
      image: dsfacr.azurecr.io/runner/dna_temurin_17:latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare runner environment
        uses: ./.github/actions/runner-config

      - name: Prepare sbt credentials
        uses: ./.github/actions/sbt-credentials
        with:
          host: ${{ vars.ARTIFACTORY_HOST }}
          username: ${{ vars.ARTIFACTORY_USER }}
          token: ${{ secrets.ARTIFACTORY_TOKEN }}

      - name: Determine stage
        id: stage
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            STAGE="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            STAGE="prod"
          elif [ "${{ github.ref }}" = "refs/heads/qual" ]; then
            STAGE="qual"
          else
            STAGE="dev"
          fi
          echo "STAGE=${STAGE}" >> $GITHUB_OUTPUT
          echo "BUILD_ID=$(date +'%Y%m%d-%H%M')-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT


      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      # One sbt invocation: compile + tests + assembly + stage. `sparkConfig` is read by `Configuration` from the
      # environment (it wins over any local `test-config.json`) so `TestWithSpark` can spin up a `LocalSpark` session
      # inside the runner without committing a config file. Use the repo variable so the value is centrally managed
      # (mirrors the pattern in `libraries/.github/workflows/pr.yml`).
      - name: Build (test + assembly + stage)
        env:
          sparkConfig: ${{ vars.SCALATEST_LOCAL_SPARKCONFIG }}
        run: sbt "Test/compile" "lakehouse/test" "lakehouse/assembly" "devops/stage"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to ${{ steps.stage.outputs.STAGE }}
        # env:
        #  DATABRICKS_TF_PROVIDER: opentofu
        run: |
          STAGE="${{ steps.stage.outputs.STAGE }}"
          BUILD_ID="${{ steps.stage.outputs.BUILD_ID }}"

          # Write deployment config from environment variable to a temp file
          CONFIG_FILE="/tmp/deploy-config.json"
          echo '${{ vars.DEPLOYMENT_CONFIG }}' > "${CONFIG_FILE}"

          ./devops/target/universal/stage/bin/deploy \
            "stage=${STAGE}" \
            "buildId=${BUILD_ID}" \
            "rootPath=${GITHUB_WORKSPACE}" \
            "assetPath=/tmp/devops" \
            "jarPath=${GITHUB_WORKSPACE}/lakehouse/target/scala-2.13/lakehouse.jar" \
            "configFile=${CONFIG_FILE}"
