name: Deploy Lakehouse to Databricks

on:
  push:
    branches:
      - main
      - qual
      - dev
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qual
          - prod

concurrency:
  group: lakehouse-deploy
  cancel-in-progress: false

run-name: ${{ github.actor }} deploy databricks lakehouse job

jobs:
  deploy:
    name: Deploy lakehouse by ${{ github.actor }}
    runs-on: dna-db
    environment: 'DB-DNA-DEV'
    #environment: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'prod' && 'DB-DNA-PROD' || github.event.inputs.environment == 'qual' && 'DB-DNA-QUAL' || 'DB-DNA-DEV') || github.ref == 'refs/heads/main' && 'DB-DNA-PROD' || github.ref == 'refs/heads/qual' && 'DB-DNA-QUAL' || 'DB-DNA-DEV' }}
    container:
      image: ctdsfacr.azurecr.io/runner/sbt_java17:latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare runner environment
        uses: ./.github/actions/runner-config

      - name: Prepare sbt credentials
        uses: ./.github/actions/sbt-credentials
        with:
          host: ${{ secrets.ARTIFACTORY_HOST }}
          username: ${{ secrets.ARTIFACTORY_USERNAME }}
          token: ${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Determine stage
        id: stage
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "STAGE=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "STAGE=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/qual" ]; then
            echo "STAGE=qual" >> $GITHUB_OUTPUT
          else
            echo "STAGE=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and test lakehouse assembly
        run: sbt "clean;test;lakehouse/assembly"

      - name: Stage cicd subproject
        run: sbt "cicd/stage"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to ${{ steps.stage.outputs.STAGE }}
        run: |
          STAGE=${{ steps.stage.outputs.STAGE }}
          BUILD_ID=$(date +"%Y%m%d-%H%M")
          DEPLOYMENT_CONFIG=$(printf '%s' \
            '{"host":"${{ secrets.DB_HOST }}",' \
            '"volumeCatalog":"${{ vars.VOLUME_CATALOG }}",' \
            '"deploymentIdentity":{"authType":"azure-client-secret","tenantId":"${{ secrets.ARM_TENANT_ID }}","clientId":"${{ secrets.DB_DEPLOY_CLIENT_ID }}","clientSecret":"${{ secrets.DB_DEPLOY_CLIENT_SECRET }}"},' \
            '"jobRunIdentity":{"clientId":"${{ secrets.DB_JOB_RUN_CLIENT_ID }}"},' \
            '"clusterConfiguration":{"sparkVersion":"17.3.x-scala2.13","clusterPolicyId":"${{ vars.CLUSTER_POLICY_ID }}","maxWorkerNodes":${{ vars.MAX_WORKER_NODES || 4 }}}' \
            '}')
          ./cicd/target/universal/stage/bin/deploy \
            "stage=$STAGE" \
            "buildId=$BUILD_ID" \
            "rootPath=$GITHUB_WORKSPACE" \
            "assetPath=/tmp/cicd" \
            "jarPath=$GITHUB_WORKSPACE/lakehouse/target/scala-2.13/lakehouse.jar" \
            "deploymentConfig=$DEPLOYMENT_CONFIG"
