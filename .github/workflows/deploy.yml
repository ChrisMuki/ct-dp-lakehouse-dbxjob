name: Deploy Lakehouse to Databricks

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qual
          - prod

concurrency:
  group: lakehouse-deploy
  cancel-in-progress: false

run-name: ${{ github.actor }} deploy databricks lakehouse job

permissions:
  contents: write
  id-token: write

env:
  azAuth: ${{ vars.AZAUTH }}

jobs:
  deploy:
    name: Deploy lakehouse by ${{ github.actor }}
    runs-on: dna17-2
    # workflow_dispatch picks the environment via input; a push to main deploys dev only.
    # Promotion to qual/prod is an explicit, manual workflow_dispatch run.
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare runner environment
        uses: CT-DnA/devops-library/.github/actions/runner-config@v1
        with:
          debugProxy: true

      - name: Determine stage
        id: stage
        run: |
          # workflow_dispatch picks the stage via input; a push to main deploys dev only.
          # Promotion to qual/prod is an explicit, manual workflow_dispatch run.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            STAGE="${{ github.event.inputs.environment }}"
          else
            STAGE="dev"
          fi
          echo "STAGE=${STAGE}" >> $GITHUB_OUTPUT
          echo "BUILD_ID=$(date +'%Y%m%d-%H%M')-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      # One sbt invocation: compile + tests + assembly + stage. `sparkConfig` is read by `Configuration` from the
      # environment (it wins over any local `local-config.json`) so `TestWithSpark` can spin up a `LocalSpark` session
      # inside the runner without committing a config file. Use the repo variable so the value is centrally managed
      # (mirrors the pattern in `libraries/.github/workflows/pr.yml`).
      - name: Build (test + assembly + stage)
        env:
          sparkConfig: ${{ vars.SCALATEST_LOCAL_SPARKCONFIG }}
        run: sbt "Test/compile" "scalafixAll --check" "test" "lakehouse/assembly" "devops/stage"

      - name: Configure git identity
        uses: CT-DnA/devops-library/.github/actions/git-identity@v1

      - name: Deploy to ${{ steps.stage.outputs.STAGE }}
        run: |
          STAGE="${{ steps.stage.outputs.STAGE }}"
          BUILD_ID="${{ steps.stage.outputs.BUILD_ID }}"

          # Deployment config is committed in-repo as plain Scala (Config.stageConfig); it is selected purely by the
          # "stage=" argument, so there is no config file to locate or pass.
          ./devops/target/universal/stage/bin/deploy \
            "stage=${STAGE}" \
            "buildId=${BUILD_ID}" \
            "rootPath=${GITHUB_WORKSPACE}" \
            "assetPath=/tmp/devops" \
            "jarPath=${GITHUB_WORKSPACE}/lakehouse/target/scala-2.13/lakehouse.jar"
